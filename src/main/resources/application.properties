spring.application.name=smart-ward-system

# Database connection settings
spring.datasource.url=jdbc:mysql://localhost:3306/smart_ward_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=raman
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server configuration
server.port=8080

# Thymeleaf caching for development
spring.thymeleaf.cache=false

# SQL Init
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
