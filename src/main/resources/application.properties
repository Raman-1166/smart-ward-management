spring.application.name=smart-ward-system

# Database connection settings (Production Ready)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_ward_management_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:raman}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server configuration
server.port=${PORT:8080}

# Thymeleaf caching for development
spring.thymeleaf.cache=true

# SQL Init
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Management & Health Checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
