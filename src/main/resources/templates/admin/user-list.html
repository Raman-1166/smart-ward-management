<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Citizen Management')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: navbar('admin')}"></nav>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold mb-0">Citizen Management</h1>
                <p class="text-muted">View and manage registered citizens</p>
            </div>
        </div>

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Ward</th>
                                <th class="pe-4 text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${users}">
                                <td class="ps-4 fw-bold" th:text="'#' + ${u.id}">#1</td>
                                <td th:text="${u.name}">Name</td>
                                <td th:text="${u.email}">email@example.com</td>
                                <td>
                                    <span th:class="'badge ' + (${u.role.name() == 'ADMIN'} ? 'bg-danger' : 'bg-primary')" th:text="${u.role}">ROLE</span>
                                </td>
                                <td th:text="${u.ward != null ? u.ward.name : 'N/A'}">Ward Name</td>
                                <td class="pe-4 text-end">
                                    <button class="btn btn-sm btn-outline-secondary" disabled>Edit</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a href="/admin/dashboard" class="text-muted text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
            </a>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
