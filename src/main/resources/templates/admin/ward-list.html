<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Manage Wards')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: navbar('admin')}"></nav>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold mb-0">Ward Management</h1>
                <p class="text-muted">Register and update administrative wards</p>
            </div>
            <a href="/admin/wards/new" class="btn btn-success rounded-pill px-4 fw-bold shadow-sm">
                <i class="bi bi-plus-lg me-2"></i> Add New Ward
            </a>
        </div>

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Ward Name</th>
                                <th>Area</th>
                                <th>Population</th>
                                <th>Officer</th>
                                <th>Score</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="w : ${wards}">
                                <td class="ps-4">
                                    <div class="fw-bold text-dark" th:text="${w.name}">Ward Name</div>
                                    <small class="text-muted" th:text="'ID: #' + ${w.id}">#1</small>
                                </td>
                                <td th:text="${w.area}">North</td>
                                <td th:text="${#numbers.formatInteger(w.population, 0, 'COMMA')}">25,000</td>
                                <td th:text="${w.officerName}">Name</td>
                                <td>
                                    <span class="badge bg-success-subtle text-success px-2 py-1 rounded" th:text="${w.cleanlinessScore} + '%'">92%</span>
                                </td>
                                <td class="text-end pe-4">
                                    <div class="btn-group shadow-sm rounded-pill overflow-hidden">
                                        <a th:href="@{/admin/wards/{id}/services(id=${w.id})}" class="btn btn-sm btn-outline-primary" title="Manage Services">
                                            <i class="bi bi-building"></i>
                                        </a>
                                        <a th:href="@{/admin/wards/edit/{id}(id=${w.id})}" class="btn btn-sm btn-outline-dark" title="Edit Ward">
                                            <i class="bi bi-pencil-square"></i>
                                        </a>
                                        <a th:href="@{/admin/wards/delete/{id}(id=${w.id})}" class="btn btn-sm btn-outline-danger" title="Delete" onclick="return confirm('Are you sure you want to delete this ward?')">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(wards)}">
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                    No wards registered yet.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a href="/admin/dashboard" class="text-muted text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
            </a>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
