<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Manage Services for ' + ${ward.name})}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: navbar('admin')}"></nav>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold mb-0" th:text="${ward.name} + ' Services'">Ward Services</h1>
                <p class="text-muted">Manage hospitals, banks, and other local facilities</p>
            </div>
            <a th:href="@{/admin/wards/{id}/services/new(id=${ward.id})}" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">
                <i class="bi bi-plus-lg me-2"></i> Add New Facility
            </a>
        </div>

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Facility Name</th>
                                <th>Category</th>
                                <th>Address</th>
                                <th>Timing</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${services}">
                                <td class="ps-4">
                                    <div class="fw-bold text-dark" th:text="${s.name}">Service Name</div>
                                    <small class="text-muted"><i class="bi bi-telephone-fill me-1"></i> <span th:text="${s.phone}">Phone</span></small>
                                </td>
                                <td>
                                    <span class="badge bg-secondary-subtle text-secondary border px-2 py-1" th:text="${s.category}">Category</span>
                                </td>
                                <td class="small text-muted" th:text="${s.address}">Address</td>
                                <td class="small fw-medium" th:text="${s.openingTime} + ' - ' + ${s.closingTime}">09:00 - 18:00</td>
                                <td class="text-end pe-4">
                                    <a th:href="@{/admin/wards/{wid}/services/delete/{sid}(wid=${ward.id}, sid=${s.id})}" 
                                       class="btn btn-sm btn-outline-danger shadow-sm rounded-pill px-3" 
                                       onclick="return confirm('Are you sure you want to remove this facility?')">
                                        Remove
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(services)}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    No facilities registered for this ward yet.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a href="/admin/wards" class="text-muted text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i> Back to Wards List
            </a>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
