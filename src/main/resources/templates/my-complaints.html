<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('My Complaints')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: navbar('complaint')}"></nav>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <h1 class="display-6 fw-bold">My Reported Issues</h1>
                <p class="text-muted mb-0">Track the status of your submitted complaints.</p>
            </div>
            <a href="/complaint/new" class="btn btn-primary rounded-pill px-4"><i class="bi bi-plus-lg me-2"></i>New Complaint</a>
        </div>

        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Ward</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Submitted On</th>
                            <th>Status Cat.</th>
                            <th class="pe-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${complaints}">
                            <td class="ps-4 text-muted fw-bold" th:text="'#' + ${c.id}">#1</td>
                            <td th:text="${c.ward.name}">Vijay Nagar</td>
                            <td>
                                <span class="badge bg-light text-dark fw-medium border" th:text="${c.category}">GARBAGE</span>
                            </td>
                            <td>
                                <p class="text-truncate mb-0" style="max-width: 250px;" th:text="${c.description}">Issue detail...</p>
                            </td>
                            <td class="small text-muted" th:text="${#temporals.format(c.createdAt, 'dd MMM yyyy')}">Date</td>
                            <td>
                                <small class="text-uppercase fw-bold text-muted small" th:text="${c.status}">PENDING</small>
                            </td>
                            <td class="pe-4 text-center">
                                <span th:if="${c.status.name() == 'PENDING'}" class="badge bg-warning rounded-pill px-3">Pending</span>
                                <span th:if="${c.status.name() == 'IN_PROGRESS'}" class="badge bg-info text-white rounded-pill px-3">In Progress</span>
                                <span th:if="${c.status.name() == 'RESOLVED'}" class="badge bg-success rounded-pill px-3">Resolved</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(complaints)}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                                You haven't filed any complaints yet.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
