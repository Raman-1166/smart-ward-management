<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Smart Ward'">Smart Ward Management</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<header th:fragment="navbar">
    <nav class="navbar">
        <a href="/" class="brand">
            🌿 Smart Ward System
        </a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/wards">Wards & Facilities</a></li>
            <li th:if="${session.loggedInUser != null}"><a href="/complaint">File Complaint</a></li>
        </ul>
        <div class="auth-buttons">
            <th:block th:if="${session.loggedInUser == null}">
                <a href="/login" class="btn btn-outline">Login</a>
                <a href="/register" class="btn btn-primary">Register</a>
            </th:block>
            <th:block th:if="${session.loggedInUser != null}">
                <!-- Dynamic link to dashboard based on role -->
                <a th:if="${session.loggedInUser.role == 'ADMIN'}" href="/admin" class="btn btn-outline">Admin Panel</a>
                <a th:if="${session.loggedInUser.role == 'CITIZEN'}" href="/dashboard" class="btn btn-outline">My Dashboard</a>
                
                <a href="/logout" class="btn btn-primary">Logout</a>
            </th:block>
        </div>
    </nav>
</header>

</body>
</html>
