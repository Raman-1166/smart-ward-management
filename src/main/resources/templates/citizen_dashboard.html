<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('My Dashboard')}"></head>
<body>
    <header th:replace="~{layout :: navbar}"></header>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2 th:text="'Welcome, ' + ${user.fullName}"></h2>
                <p class="text-muted">Track your reported issues and ward status.</p>
            </div>
            <a href="/complaint" class="btn btn-primary">+ File New Complaint</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="card" style="padding: 0; overflow: hidden;">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0;">My Reported Complaints</h3>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Category</th>
                            <th>Issue</th>
                            <th>Ward</th>
                            <th>Date Filed</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="complaint : ${complaints}">
                            <td th:text="'#' + ${complaint.id}"></td>
                            <td th:text="${complaint.type}"></td>
                            <td th:text="${complaint.title}"></td>
                            <td th:text="'Ward ' + ${complaint.ward.wardNumber}"></td>
                            <td th:text="${#temporals.format(complaint.createdAt, 'dd MMM yyyy, HH:mm')}"></td>
                            <td>
                                <span th:class="'badge ' + 
                                    (${complaint.status == 'PENDING'} ? 'badge-pending' : 
                                    (${complaint.status == 'IN_PROGRESS'} ? 'badge-progress' : 'badge-resolved'))"
                                    th:text="${complaint.status}">
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(complaints)}">
                            <td colspan="6" class="text-center" style="padding: 3rem; color: var(--text-muted);">
                                You haven't filed any complaints yet. 
                                <br><br>
                                <a href="/complaint" class="btn btn-outline">Ship your first report</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
