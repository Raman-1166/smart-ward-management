<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Manage Complaints')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: navbar('admin')}"></nav>

    <main class="container my-5">
        <div class="row mb-4">
            <div class="col-md-6">
                <h1 class="fw-bold">All Citizen Complaints</h1>
                <p class="text-muted">Review and update city-wide issue statuses.</p>
            </div>
            <div class="col-md-6 text-md-end">
                <div class="btn-group" role="group">
                    <a href="/admin/complaints" class="btn btn-outline-secondary" th:classappend="${currentStatus == null ? 'active' : ''}">All</a>
                    <a href="/admin/complaints?status=PENDING" class="btn btn-outline-warning" th:classappend="${currentStatus != null and currentStatus.name() == 'PENDING' ? 'active' : ''}">Pending</a>
                    <a href="/admin/complaints?status=IN_PROGRESS" class="btn btn-outline-info text-dark" th:classappend="${currentStatus != null and currentStatus.name() == 'IN_PROGRESS' ? 'active' : ''}">In Progress</a>
                    <a href="/admin/complaints?status=RESOLVED" class="btn btn-outline-success" th:classappend="${currentStatus != null and currentStatus.name() == 'RESOLVED' ? 'active' : ''}">Resolved</a>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark text-uppercase small">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Citizen</th>
                            <th>Ward</th>
                            <th>Category</th>
                            <th>Status Cat.</th>
                            <th>Last Updated</th>
                            <th class="pe-4">Quick Update</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${complaintsPage.content}">
                            <td class="ps-4 fw-bold" th:text="'#' + ${c.id}">#1</td>
                            <td>
                                <div class="fw-bold" th:text="${c.user.name}">Raman C.</div>
                                <div class="small text-muted" th:text="${c.user.email}">user@mail.com</div>
                            </td>
                            <td>
                                <div class="fw-bold" th:text="${c.ward.name}">Vijay Nagar</div>
                            </td>
                            <td>
                                <span class="badge bg-light text-dark border" th:text="${c.category}">CATEGORY</span>
                            </td>
                            <td>
                                <span th:class="'badge ' + 
                                      (${c.status.name() == 'PENDING'} ? 'bg-warning' : 
                                      (${c.status.name() == 'IN_PROGRESS'} ? 'bg-info' : 'bg-success'))"
                                      th:text="${c.status}">STATUS</span>
                            </td>
                            <td class="small text-muted" th:text="${#temporals.format(c.updatedAt != null ? c.updatedAt : c.createdAt, 'dd MMM HH:mm')}">Time</td>
                            <td class="pe-4">
                                <div class="d-flex align-items-center">
                                    <form th:action="@{/admin/complaints/{id}/status(id=${c.id})}" method="post" class="me-2">
                                        <div class="input-group input-group-sm" style="width: 200px;">
                                            <select name="status" class="form-select border-success">
                                                <option value="PENDING" th:selected="${c.status.name() == 'PENDING'}">Pending</option>
                                                <option value="IN_PROGRESS" th:selected="${c.status.name() == 'IN_PROGRESS'}">In Progress</option>
                                                <option value="RESOLVED" th:selected="${c.status.name() == 'RESOLVED'}">Resolved</option>
                                            </select>
                                            <button class="btn btn-success border-success" type="submit">Update</button>
                                        </div>
                                    </form>
                                    <form th:if="${c.status.name() != 'RESOLVED'}" th:action="@{/admin/complaints/{id}/status(id=${c.id})}" method="post">
                                        <input type="hidden" name="status" value="RESOLVED">
                                        <button class="btn btn-sm btn-success rounded-pill px-3 fw-bold" type="submit">
                                            <i class="bi bi-check-lg me-1"></i> Resolve
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination Controls -->
            <div class="card-footer bg-white py-3 border-top-0">
                <nav aria-label="Page navigation">
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${!complaintsPage.hasPrevious() ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/complaints(page=${complaintsPage.number - 1}, status=${currentStatus})}" tabindex="-1">Previous</a>
                        </li>
                        <li class="page-item disabled">
                            <span class="page-link" th:text="'Page ' + (${complaintsPage.number} + 1) + ' of ' + ${complaintsPage.totalPages}">Page 1 of 1</span>
                        </li>
                        <li class="page-item" th:classappend="${!complaintsPage.hasNext() ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/complaints(page=${complaintsPage.number + 1}, status=${currentStatus})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
